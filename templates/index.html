<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Project | Welcome</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* 🌈 Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #89f7fe, #66a6ff, #c3cfe2);
    position: relative;
    overflow: hidden;
}

/* Blur blobs */
body::before, body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.4);
    filter: blur(120px);
    border-radius: 50%;
}
body::before { top: -100px; left: -100px; }
body::after { bottom: -100px; right: -100px; }

/* 📦 Glass Card */
.card {
    width: 90%;
    max-width: 500px;
    padding: 40px 30px;
    border-radius: 25px;
    text-align: center;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

/* Title */
h1 {
    font-size: 28px;
    margin-bottom: 15px;
}

/* Subtitle */
p {
    font-size: 15px;
    color: #333;
    margin-bottom: 25px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 14px 25px;
    border-radius: 14px;
    background: linear-gradient(135deg, #007aff, #5ac8fa);
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Footer text */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎓 ML Project</h1>
    <p>
        Welcome to the <b>Student Performance Prediction System</b>.<br>
        Predict student math scores using Machine Learning.
    </p>

    <!-- Redirect to home page -->
    <a href="{{ url_for('predict_datapoint') }}" class="btn">
        🚀 Start Prediction
    </a>

    <div class="footer">
        Built with ❤️ using Machine Learning & Flask
    </div>
</div>

</body>
</html>
