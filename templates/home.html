<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Performance Predictor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* 🌈 Background */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 10px;
    background: linear-gradient(120deg, #89f7fe, #66a6ff, #c3cfe2);
    position: relative;
    overflow-y: auto;
}

/* Blur blobs */
body::before, body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.4);
    filter: blur(120px);
    border-radius: 50%;
}
body::before { top: -100px; left: -100px; }
body::after { bottom: -100px; right: -100px; }

/* 📦 Card */
.card {
    width: 95%;
    max-width: 520px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

/* Title */
h1 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 20px;
}

/* Inputs */
label {
    font-size: 14px;
    margin-bottom: 5px;
    display: block;
    color: #333;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.7);
    font-size: 14px;
}

input:focus, select:focus {
    background: white;
    box-shadow: 0 0 0 2px #66a6ff;
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #007aff, #5ac8fa);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}

.btn:active {
    transform: scale(0.97);
}

/* 🪟 Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.2);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    animation: popIn 0.3s ease;
}

@keyframes popIn {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.close-btn {
    float: right;
    font-size: 22px;
    cursor: pointer;
}

/* Responsive */
@media (min-width: 768px) {
    .card {
        padding: 40px;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>📊 Student Performance Predictor</h1>

    <form action="{{ url_for('predict_datapoint')}}" method="post">

        <label>Gender</label>
        <select name="gender" required>
            <option disabled selected>Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select name="ethnicity" required>
            <option disabled selected>Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Education</label>
        <select name="parental_level_of_education" required>
            <option disabled selected>Select Education</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>

        <label>Lunch Type</label>
        <select name="lunch" required>
            <option disabled selected>Select Lunch</option>
            <option value="free/reduced">Free/Reduced</option>
            <option value="standard">Standard</option>
        </select>

        <label>Test Preparation</label>
        <select name="test_preparation_course" required>
            <option disabled selected>Select Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required>

        <label>Writing Score</label>
        <input type="number" name="writing_score" min="0" max="100" required>

        <button class="btn" type="submit">🚀 Predict Math Score</button>
    </form>
</div>

<!-- RESULT MODAL -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>📊 Prediction Result</h2>
        <p id="resultText">{{ result }}</p>
    </div>
</div>

<script>
// Show modal only if result exists
window.onload = function() {
    let result = "{{ result }}";
    if (result && result !== "None" && result.trim() !== "") {
        document.getElementById("resultModal").style.display = "flex";
    }
}

// Close modal
function closeModal() {
    document.getElementById("resultModal").style.display = "none";
}
</script>

</body>
</html>
